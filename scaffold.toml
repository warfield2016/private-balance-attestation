# logos-scaffold project config. `lgs setup`, `lgs build`, `lgs deploy`,
# `lgs spel -- <args>`, and `lgs doctor` read this. Pin tagged
# releases — `lgs doctor` warns if these drift from what's vendored
# under .scaffold/.

[project]
name = "attestation_program"
description = "LP-0005 private balance attestation primitive for LEZ"

[repos.lez]
git = "https://github.com/logos-blockchain/logos-execution-zone.git"
tag = "v0.2.0-rc3"

[repos.spel]
git = "https://github.com/logos-co/spel.git"
tag = "v0.3.0"

[repos.basecamp]
# Pinned for repeatable Basecamp app loads. Leave commented until a
# stable Basecamp release surfaces a tag; rolling against main today.
# git = "https://github.com/logos-co/logos-basecamp.git"
# tag = "<tag>"

[programs]
# Auto-discovered from methods/guest/target/ — listed here so
# `lgs doctor` can sanity-check the expected names match what
# `make build` produces.
attestation = "methods/guest/target/riscv32im-risc0-zkvm-elf/docker/attestation.bin"

[risc0]
# Pinned to match workspace Cargo.toml. lez-multisig pattern.
version = "3.0.5"
